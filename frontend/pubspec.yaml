name: bloodconnect
description: Intelligent Blood Donation Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.2
  pretty_dio_logger: ^1.3.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Dependency injection
  get_it: ^7.6.4

  # Navigation
  go_router: ^12.0.1


  # Maps
  geolocator: ^10.1.0

  # UI
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # Utils
  intl: ^0.18.1
  jwt_decoder: ^2.0.1
  image_picker: ^1.0.4
  permission_handler: ^11.1.0
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

services:
  mongodb:
    image: mongo:7.0
    container_name: bloodconnect-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
    networks:
      - bloodconnect-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bloodconnect-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bloodconnect-network
    expose:
      - '3000'

  nginx:
    image: nginx:1.25-alpine
    container_name: bloodconnect-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - bloodconnect-network

volumes:
  mongo_data:

networks:
  bloodconnect-network:
    driver: bridge
